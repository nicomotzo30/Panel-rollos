<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Producción — Rollos</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg:         #0f1117;
    --surface:    #161a24;
    --border:     #222840;
    --green:      #18c95d;
    --green-dim:  #082b18;
    --red:        #e53935;
    --red-dim:    #1f0909;
    --yellow:     #f5a623;
    --yellow-dim: #211608;
    --text:       #eef0f8;
    --muted:      #4a5270;
    --accent:     #3d7fff;
    --cyan:       #00c8d4;
    --cyan-dim:   #041e20;
  }

  html, body {
    width:100%; height:100%;
    background:var(--bg); color:var(--text);
    font-family:'Barlow',sans-serif;
    overflow:hidden;
  }

  /* ══ ROOT LAYOUT ══ */
  .root {
    display:grid;
    grid-template-rows: 60px 1fr 1fr 44px;
    grid-template-columns: 1fr 280px;
    height:100vh;
    padding:10px 12px;
    gap:8px;
  }

  /* ══ HEADER ══ */
  header {
    grid-column: 1 / -1;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:2px solid var(--border);
    padding-bottom:10px;
  }

  .header-left { display:flex; align-items:baseline; gap:14px; }

  .brand {
    font-family:'Barlow Condensed',sans-serif;
    font-size:26px; font-weight:900; letter-spacing:2px; text-transform:uppercase;
  }

  .tag {
    font-family:'Barlow Condensed',sans-serif;
    font-size:12px; font-weight:700; letter-spacing:4px; text-transform:uppercase;
    color:var(--muted); border:1px solid var(--border); padding:2px 10px; border-radius:2px;
  }

  .header-right { display:flex; align-items:center; gap:32px; }

  .clock {
    font-family:'Barlow Condensed',sans-serif;
    font-size:36px; font-weight:700; letter-spacing:2px; line-height:1;
    text-align:right;
  }
  .date { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); text-align:right; }

  .live-badge {
    display:flex; align-items:center; gap:7px;
    font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); font-weight:600;
  }
  .live-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--green); box-shadow:0 0 8px var(--green);
    animation:blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ══ SECTION LABELS ══ */
  .section-wrap {
    display:flex; flex-direction:column; gap:6px; min-height:0;
  }

  .section-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:15px; font-weight:700; letter-spacing:4px;
    text-transform:uppercase; color:var(--muted);
    display:flex; align-items:center; gap:8px;
  }
  .section-label::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  /* ══ REBOBINADORAS GRID (2×3) ══ */
  .rebob-grid {
    display:grid;
    grid-template-columns: repeat(3,1fr);
    grid-template-rows: repeat(2,1fr);
    gap:8px;
    flex:1; min-height:0;
  }

  /* ══ MESAS GRID (1×3) ══ */
  .mesas-grid {
    display:grid;
    grid-template-columns: repeat(3,1fr);
    gap:8px;
    flex:1; min-height:0;
  }

  /* ══ CARD BASE ══ */
  .card {
    border-radius:5px;
    padding:10px 13px 9px;
    border:2px solid var(--border);
    background:var(--surface);
    position:relative; overflow:hidden;
    display:flex; flex-direction:column; justify-content:space-between;
    transition:border-color .3s, background .3s;
  }

  .card::before {
    content:''; position:absolute; left:0;top:0;bottom:0; width:4px;
    border-radius:5px 0 0 5px;
    background:var(--border);
    transition:background .3s;
  }

  .card.active   { border-color:var(--green);  background:var(--green-dim); }
  .card.paused   { border-color:var(--yellow); background:var(--yellow-dim); }
  .card.inactive { border-color:var(--red);    background:var(--red-dim); }

  .card.active::before   { background:var(--green); }
  .card.paused::before   { background:var(--yellow); }
  .card.inactive::before { background:var(--red); }

  /* Mesa card — accent diferente para distinguir del sector rebob */
  .card.mesa-active { border-color:var(--cyan); background:var(--cyan-dim); }
  .card.mesa-active::before { background:var(--cyan); }

  /* card top row */
  .card-top {
    display:flex; align-items:center; justify-content:space-between; gap:6px;
  }

  .machine-id {
    font-family:'Barlow Condensed',sans-serif;
    font-size:13px; font-weight:700; letter-spacing:3px;
    text-transform:uppercase; color:var(--muted);
  }

  .status-pill {
    font-family:'Barlow Condensed',sans-serif;
    font-size:11px; font-weight:700; letter-spacing:2px;
    text-transform:uppercase; padding:2px 9px; border-radius:20px; white-space:nowrap;
  }
  .card.active   .status-pill { background:rgba(24,201,93,.12);  color:var(--green); }
  .card.paused   .status-pill { background:rgba(245,166,35,.12); color:var(--yellow); }
  .card.inactive .status-pill { background:rgba(229,57,53,.12);  color:var(--red); }
  .card.mesa-active .status-pill { background:rgba(0,200,212,.12); color:var(--cyan); }

  /* product name */
  .product-name {
    font-family:'Barlow Condensed',sans-serif;
    font-size:60px; font-weight:800; line-height:1.05;
    text-transform:uppercase; color:var(--text);
    margin:3px 0 2px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card.mesa-active .product-name,
  .card.inactive.mesa .product-name {
    font-size:60px; -webkit-line-clamp:3;
  }
  .card.inactive .product-name { color:rgba(238,240,248,.22); font-size:20px; }

  /* card bottom */
  .card-bottom {
    display:flex; align-items:flex-end; justify-content:space-between; gap:8px;
  }

  .bottom-left { display:flex; flex-direction:column; gap:2px; min-width:0; }

  .operator {
    font-size:13px; font-weight:600; color:rgba(238,240,248,.55);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .inicio-time {
    font-family:'Barlow Condensed',sans-serif;
    font-size:12px; letter-spacing:1px; color:var(--muted);
  }

  .stop-reason {
    font-family:'Barlow Condensed',sans-serif;
    font-size:15px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  }
  .card.inactive .stop-reason { color:var(--red); opacity:.8; }
  .card.paused   .stop-reason { color:var(--yellow); opacity:.9; }

  /* right metrics block */
  .metrics {
    display:flex; flex-direction:column; align-items:flex-end; gap:3px; flex-shrink:0;
  }

  /* cajas */
  .cajas-num {
    font-family:'Barlow Condensed',sans-serif;
    font-size:38px; font-weight:900; line-height:1; letter-spacing:1px;
  }
  .card.active      .cajas-num { color:var(--green); }
  .card.mesa-active .cajas-num { color:var(--cyan); }
  .card.paused      .cajas-num { color:var(--yellow); }
  .card.inactive    .cajas-num { color:rgba(238,240,248,.2); }

  .cajas-label {
    font-size:9px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); font-weight:600; line-height:1; margin-top:-2px; text-align:right;
  }

  /* rendimiento badge */
  .rend-badge {
    display:flex; align-items:center; gap:5px;
    padding:3px 8px; border-radius:3px;
    font-family:'Barlow Condensed',sans-serif;
    font-size:15px; font-weight:800; letter-spacing:1px;
  }
  .rend-badge.high { background:rgba(24,201,93,.15);  color:var(--green); }
  .rend-badge.mid  { background:rgba(245,166,35,.15); color:var(--yellow); }
  .rend-badge.low  { background:rgba(229,57,53,.15);  color:var(--red); }
  .rend-badge.none { background:rgba(255,255,255,.04); color:var(--muted); }

  .rend-label {
    font-size:9px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); font-weight:600; text-align:right;
  }

  /* ══ LEFT COLUMN (plan + stats) ══ */
  .right-col {
    grid-column: 2;
    grid-row: 2 / 4;
    display:flex; flex-direction:column; gap:8px;
  }

  /* ══ MACHINE SECTIONS (left side) ══ */
  .section-wrap {
    grid-column: 1;
  }

  .panel-box {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:5px;
    padding:14px 14px 12px;
    flex:1; overflow:hidden;
    display:flex; flex-direction:column;
  }

  .panel-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:15px; font-weight:700; letter-spacing:4px;
    text-transform:uppercase; color:var(--muted);
    margin-bottom:10px;
    padding-bottom:8px;
    border-bottom:1px solid var(--border);
  }

  /* plan rows */
  .plan-list { display:flex; flex-direction:column; flex:1; overflow:hidden; }

  .plan-row {
    display:flex; flex-direction:column;
    padding:8px 0;
    border-bottom:1px solid rgba(34,40,64,.8);
  }
  .plan-row:last-child { border-bottom:none; }

  .plan-product {
    font-family:'Barlow Condensed',sans-serif;
    font-size:40px; font-weight:800; text-transform:uppercase;
    line-height:1.1; color:var(--text);
  }

  .plan-meta {
    display:flex; gap:8px; align-items:center; margin-top:2px;
  }

  .plan-fecha {
    font-size:11px; font-weight:600; letter-spacing:1px;
    color:var(--accent); text-transform:uppercase;
  }

  .plan-maquina {
    font-size:11px; color:var(--muted); letter-spacing:1px;
  }

  /* stats box */
  .stats-box {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:5px;
    padding:12px 14px;
    display:flex; flex-direction:column; gap:7px;
  }

  .stats-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:11px; font-weight:700; letter-spacing:4px;
    text-transform:uppercase; color:var(--muted);
  }

  .stats-row {
    display:flex; justify-content:space-between; align-items:center;
  }

  .stats-val {
    font-family:'Barlow Condensed',sans-serif;
    font-size:21px; font-weight:800; letter-spacing:1px;
  }
  .stats-val.green  { color:var(--green); }
  .stats-val.cyan   { color:var(--cyan); }
  .stats-val.red    { color:var(--red); }
  .stats-val.yellow { color:var(--yellow); }

  .stats-lbl {
    font-size:10px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); font-weight:600;
  }

  /* ══ FOOTER ══ */
  footer {
    grid-column:1 / -1;
    display:flex; align-items:center; justify-content:space-between;
    border-top:1px solid var(--border); padding-top:8px;
  }

  .footer-left { display:flex; gap:28px; align-items:center; }
  .footer-stat { display:flex; align-items:baseline; gap:5px; }
  .footer-stat-lbl { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-weight:600; }
  .footer-stat-val { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; }
  .footer-stat-val.g { color:var(--green); }
  .footer-stat-val.y { color:var(--yellow); }
  .footer-stat-val.r { color:var(--red); }
  .footer-stat-val.c { color:var(--cyan); }

  .footer-right {
    font-size:10px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); font-weight:600;
  }

  @keyframes numflash { 0%{opacity:.3} 100%{opacity:1} }
  .flash { animation:numflash .35s ease-out; }
</style>
</head>
<body>
<div class="root">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="brand" id="companyName">Alpac SRL</div>
      <div class="tag">Rollos</div>
    </div>
    <div class="header-right">
      <div class="live-badge"><div class="live-dot"></div>EN VIVO</div>
      <div>
        <div class="clock" id="clock">00:00</div>
        <div class="date" id="dateDisplay">—</div>
      </div>
    </div>
  </header>

  <!-- REBOBINADORAS -->
  <div class="section-wrap">
    <div class="section-label">Rebobinadoras</div>
    <div class="rebob-grid" id="rebobGrid"></div>
  </div>

  <!-- MESAS DE EMBALAJE -->
  <div class="section-wrap">
    <div class="section-label">FC-10-05-CONTROL DE EMBALAJE</div>
    <div class="mesas-grid" id="mesasGrid"></div>
  </div>

  <!-- RIGHT COLUMN (plan + stats) -->
  <div class="right-col">

    <!-- PLAN DE PRODUCCIÓN -->
    <div class="panel-box">
      <div class="panel-title">Plan de Producción</div>
      <div class="plan-list" id="planList"></div>
    </div>

    <!-- STATS -->
    <div class="stats-box">
      <div class="stats-title">Hoy</div>
      <div class="stats-row">
        <span class="stats-lbl">Rebob. activas</span>
        <span class="stats-val green" id="stRebobActive">—</span>
      </div>
      <div class="stats-row">
        <span class="stats-lbl">Mesas activas</span>
        <span class="stats-val cyan" id="stMesasActive">—</span>
      </div>
      <div class="stats-row">
        <span class="stats-lbl">Paradas</span>
        <span class="stats-val yellow" id="stPaused">—</span>
      </div>
      <div class="stats-row">
        <span class="stats-lbl">Inactivas</span>
        <span class="stats-val red" id="stInactive">—</span>
      </div>
      <div class="stats-row" style="margin-top:4px;border-top:1px solid var(--border);padding-top:6px;">
        <span class="stats-lbl">Turno</span>
        <span class="stats-val" style="color:var(--muted);font-size:18px">07—17hs</span>
      </div>
    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-left">
      <div class="footer-stat">
        <span class="footer-stat-lbl">Producción teórica hoy</span>
        <span class="footer-stat-val g" id="totalCajas">—</span>
      </div>
    </div>
    <div class="footer-right" id="lastUpdate">—</div>
  </footer>

</div>

function getSku(articulo) {
  if (!articulo) return null;
  const key = articulo.trim().toUpperCase();
  if (DESC_A_SKU[key]) return DESC_A_SKU[key];
  // fuzzy match
  const found = Object.keys(DESC_A_SKU).find(k => key.includes(k) || k.includes(key));
  return found ? DESC_A_SKU[found] : null;
}

// rollos/día = rpm × 60min × 10hs

// TABLA CAJAS/DÍA (resto de rebobinadoras)
// ═══════════════════════════════════════
const PRODUCTOS_CPD = {
  "FI002": { cpd: 180 },
  "FI003": { cpd: 150 },
  "FI001": { cpd: 110 },
  "FI024": { cpd: 80  },
  "RA042": { cpd: 33  },
  "PA059": { cpd: 40  },
  "FI035": { cpd: 150 },
  "FI022": { cpd: 90  },
  "PA057": { cpd: 40  },
  "PA062": { cpd: 40  },
  "PA067": { cpd: 40  },
  "RA022": { cpd: 40  },
  "RA023": { cpd: 50  },
  "RA024": { cpd: 15  },
  "RA041": { cpd: 33  },
  "RA021": { cpd: 33  },
};

// Devuelve { valor, unidad } para rebobinadoras
function getProduccionRebob(articulo, maquinaId) {
  if (!articulo) return null;
  const sku = getSku(articulo);
  if (!sku) return null;

  if (REBOB_RPM.includes(maquinaId)) {
    const p = PRODUCTOS_RPM[sku];
    if (!p) return null;
    return { valor: Math.round(p.rpm * 60 * 10), unidad: "rollos / día" };
  } else {
    const p = PRODUCTOS_CPD[sku];
    if (!p) return null;
    return { valor: p.cpd, unidad: "cajas / día" };
  }
}

// ═══════════════════════════════════════
// TABLA DE PRODUCTOS — MESAS DE EMBALAJE
// cpd = cajas por día teóricas
// ═══════════════════════════════════════
const PRODUCTOS_MESA = {
  "ROLLO DIA FILM PVC AUTOADHERENTE 30 MTS": { cpd: 80 },
  // Agregar más productos acá
};

function getCajasDiaMesa(articulo) {
  if (!articulo) return null;
  const key = articulo.trim().toUpperCase();
  let prod = PRODUCTOS_MESA[key];
  if (!prod) {
    const found = Object.keys(PRODUCTOS_MESA).find(k => key.includes(k) || k.includes(key));
    if (found) prod = PRODUCTOS_MESA[found];
  }
  return prod ? prod.cpd : null;
}

// ═══════════════════════════════════════
// RENDIMIENTO → color
// ═══════════════════════════════════════
function rendClass(pct) {
  if (pct === null || pct === undefined) return "none";
  if (pct >= 70) return "high";
  if (pct >= 50) return "mid";
  return "low";
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function fmt(n) { return Number(n).toLocaleString("es-AR"); }

function statusLabel(estado, motivo) {
  if (estado === "active")      return "En curso";
  if (estado === "paused")      return motivo || "Parada";
  return motivo || "Inactiva";
}

function buildCard(m, tipo) {
  const esMesa = tipo === "mesa";
  const esActiva = m.estado === "active";

  // Producción teórica
  let produccion = null;
  if (esActiva) {
    if (esMesa) {
      const cpd = getCajasDiaMesa(m.articulo);
      if (cpd != null) produccion = { valor: cpd, unidad: "cajas / día" };
    } else {
      produccion = getProduccionRebob(m.articulo, m.id);
    }
  }

  // Estado CSS
  let cardClass = `card ${m.estado}`;
  if (esMesa && esActiva)  cardClass = "card mesa-active";
  if (esMesa && !esActiva) cardClass = `card ${m.estado} mesa`;

  // Nombre a mostrar: SKU para rebobinadoras, descripción para mesas
  const sku = !esMesa ? getSku(m.articulo) : null;
  const nombreProducto = m.articulo
    ? m.articulo
    : "INACTIVA";

  // Bottom left
  let blHTML = "";
  if (esActiva) {
    blHTML = `<div class="operator">${m.operario||"—"}</div>`;
    if (!esMesa && m.horaInicio) {
      blHTML += `<div class="inicio-time">Inicio: ${m.horaInicio}</div>`;
    }
  } else {
    blHTML = `<div class="stop-reason">${m.motivoParada||"Inactiva"}</div>`;
  }

  // Métrica de producción — solo rebobinadoras, mesas no muestran métrica
  const metricaHTML = esMesa ? "" : (produccion != null
    ? `<div class="cajas-num">${fmt(produccion.valor)}</div><div class="cajas-label">${produccion.unidad}</div>`
    : `<div class="cajas-num" style="font-size:22px;opacity:.2">—</div><div class="cajas-label">rollos / día</div>`);

  // Rendimiento — solo rebobinadoras
  let rendHTML = "";
  if (!esMesa) {
    const rendRaw = m.rendimiento != null
      ? (m.rendimiento <= 1 ? Math.round(m.rendimiento * 100) : Math.round(m.rendimiento))
      : null;
    const rc = rendClass(rendRaw);
    rendHTML = rendRaw != null
      ? `<div class="rend-badge ${rc}">${rendRaw}%</div><div class="rend-label">rend. ${window._mesRef||''}</div>`
      : `<div class="rend-badge none">—</div><div class="rend-label">sin dato</div>`;
  }

  const prodHTML = `<div class="product-name">${nombreProducto}</div>`;
  const pillLabel = statusLabel(m.estado, m.motivoParada);

  return { cardClass, produccion, html: `
    <div class="card-top">
      <div class="machine-id">${m.id}</div>
      <div class="status-pill">${pillLabel}</div>
    </div>
    ${prodHTML}
    <div class="card-bottom">
      <div class="bottom-left">${blHTML}</div>
      <div class="metrics">
        ${metricaHTML}
        ${rendHTML}
      </div>
    </div>
  `};
}

function renderAll(data) {
  document.getElementById("companyName").textContent = data.empresa || COMPANY_NAME;
  window._mesRef = data.mesRef || "";

  let nRebobActive=0, nMesasActive=0, nPaused=0, nInactive=0, totalCajas=0;

  // Rebobinadoras
  const rebobGrid = document.getElementById("rebobGrid");
  (data.rebobinadoras || []).forEach(m => {
    let card = document.getElementById(`r${m.id}`);
    if (!card) { card=document.createElement("div"); card.id=`r${m.id}`; rebobGrid.appendChild(card); }
    const { cardClass, produccion, html } = buildCard(m, "rebob");
    card.className = cardClass;
    card.innerHTML = html;
    if (produccion) totalCajas += produccion.valor;
    if (m.estado==="active") nRebobActive++;
    else if (m.estado==="paused") nPaused++;
    else nInactive++;
  });

  // Mesas
  const mesasGrid = document.getElementById("mesasGrid");
  (data.mesas || []).forEach(m => {
    let card = document.getElementById(`m${m.id}`);
    if (!card) { card=document.createElement("div"); card.id=`m${m.id}`; mesasGrid.appendChild(card); }
    const { cardClass, produccion, html } = buildCard(m, "mesa");
    card.className = cardClass;
    card.innerHTML = html;
    if (produccion) totalCajas += produccion.valor;
    if (m.estado==="active") nMesasActive++;
    else if (m.estado==="paused") nPaused++;
    else nInactive++;
  });

  // Stats
  document.getElementById("stRebobActive").textContent = nRebobActive;
  document.getElementById("stMesasActive").textContent = nMesasActive;
  document.getElementById("stPaused").textContent      = nPaused;
  document.getElementById("stInactive").textContent    = nInactive;

  // Total cajas
  const tcEl = document.getElementById("totalCajas");
  const newVal = fmt(totalCajas);
  if (tcEl.textContent !== newVal) {
    tcEl.textContent = newVal;
    tcEl.classList.remove("flash"); void tcEl.offsetWidth; tcEl.classList.add("flash");
  }

  // Plan
  const planList = document.getElementById("planList");
  planList.innerHTML = "";
  (data.plan||[]).forEach(p => {
    const row = document.createElement("div");
    row.className = "plan-row";
    row.innerHTML = `
      <div class="plan-product">${p.producto}</div>
      <div class="plan-meta">
        <span class="plan-fecha">${p.fecha||""}</span>
      </div>
    `;
    planList.appendChild(row);
  });

  // Last update
  const now = new Date();
  document.getElementById("lastUpdate").textContent =
    `Última actualización: ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
}

// ═══════════════════════════════════════
// RELOJ
// ═══════════════════════════════════════
function updateClock() {
  const now  = new Date();
  const h    = String(now.getHours()).padStart(2,"0");
  const m    = String(now.getMinutes()).padStart(2,"0");
  document.getElementById("clock").textContent = `${h}:${m}`;
  const days   = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  document.getElementById("dateDisplay").textContent =
    `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

// ═══════════════════════════════════════
// FETCH
// ═══════════════════════════════════════
async function fetchAndRender() {
  let data;
  if (FETCH_FROM_SHEET) {
    try { const r = await fetch(SHEET_URL); data = await r.json(); }
    catch(e) { console.warn("Sheet no disponible, usando demo"); data = getDemoData(); }
  } else {
    data = getDemoData();
  }
  renderAll(data);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
updateClock();
setInterval(updateClock, 30000);
fetchAndRender();
setInterval(fetchAndRender, REFRESH_MS);
