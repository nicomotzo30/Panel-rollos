<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Producción — Rollos</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --bg:         #0f1117;
    --surface:    #161a24;
    --border:     #222840;
    --green:      #18c95d;
    --green-dim:  #071a0f;
    --red:        #e53935;
    --red-dim:    #1a0707;
    --yellow:     #f5a623;
    --yellow-dim: #1a1007;
    --text:       #eef0f8;
    --muted:      #4a5270;
    --accent:     #3d7fff;
    --cyan:       #00c8d4;
    --cyan-dim:   #031518;
  }

  html, body {
    width:100%; height:100%;
    background:var(--bg); color:var(--text);
    font-family:'Barlow',sans-serif;
    overflow:hidden;
  }

  /* ══ ROOT LAYOUT ══ */
  .root {
    display:grid;
    grid-template-rows: 56px auto 1fr 44px;
    grid-template-columns: 1fr 1fr;
    height:100vh;
    padding:10px 12px;
    gap:8px;
  }

  /* ══ HEADER ══ */
  header {
    grid-column: 1 / -1;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:2px solid var(--border);
    padding-bottom:8px;
  }

  .header-left { display:flex; align-items:baseline; gap:14px; }

  .brand {
    font-family:'Barlow Condensed',sans-serif;
    font-size:26px; font-weight:900; letter-spacing:2px; text-transform:uppercase;
  }

  .tag {
    font-family:'Barlow Condensed',sans-serif;
    font-size:12px; font-weight:700; letter-spacing:4px; text-transform:uppercase;
    color:var(--muted); border:1px solid var(--border); padding:2px 10px; border-radius:2px;
  }

  .header-right { display:flex; align-items:center; gap:24px; }

  /* stats en header */
  .header-stats {
    display:flex; align-items:center; gap:16px;
    border-left:1px solid var(--border); padding-left:24px;
  }
  .hstat { display:flex; align-items:baseline; gap:5px; }
  .hstat-lbl { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-weight:600; }
  .hstat-val { font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; }
  .hstat-val.g { color:var(--green); }
  .hstat-val.c { color:var(--cyan); }
  .hstat-val.y { color:var(--yellow); }
  .hstat-val.r { color:var(--red); }

  .clock {
    font-family:'Barlow Condensed',sans-serif;
    font-size:34px; font-weight:700; letter-spacing:2px; line-height:1; text-align:right;
  }
  .date { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); text-align:right; }

  .live-badge {
    display:flex; align-items:center; gap:7px;
    font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); font-weight:600;
  }
  .live-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--green); box-shadow:0 0 8px var(--green);
    animation:blink 1.4s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

  /* ══ REBOBINADORAS — fila 2, ancho total ══ */
  .left-col {
    grid-column: 1 / -1;
    grid-row: 2;
    display:flex; flex-direction:column; gap:6px;
  }

  /* ══ MESAS + STATS — fila 3, columna izquierda ══ */
  .bottom-row {
    grid-column: 1;
    grid-row: 3;
    display:flex; flex-direction:column; gap:6px;
    min-height:0;
  }

  /* ══ PLAN — fila 3, columna derecha ══ */
  .right-col {
    grid-column: 2;
    grid-row: 3;
    display:flex; flex-direction:column; gap:8px;
    min-height:0;
  }

  /* ══ SECTION ══ */
  .section {
    display:flex; flex-direction:column; gap:5px;
  }

  .section-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:13px; font-weight:700; letter-spacing:4px;
    text-transform:uppercase; color:var(--muted);
    display:flex; align-items:center; gap:8px;
    flex-shrink:0;
  }
  .section-label::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  /* ══ ROW CARD ══ */
  .row-card {
    display:grid;
    grid-template-columns: 70px 1fr 160px 140px 100px;
    align-items:center;
    gap:0;
    border-radius:4px;
    border:1px solid var(--border);
    background:var(--surface);
    overflow:hidden;
    position:relative;
    height:52px;
    flex-shrink:0;
    transition:border-color .3s, background .3s;
  }

  /* left accent bar */
  .row-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
    background:var(--border);
    transition:background .3s;
  }

  .row-card.active   { border-color:var(--green);  background:var(--green-dim); }
  .row-card.paused   { border-color:var(--yellow); background:var(--yellow-dim); }
  .row-card.inactive { border-color:var(--red);    background:var(--red-dim); }
  .row-card.mesa-active { border-color:var(--cyan); background:var(--cyan-dim); }

  .row-card.active::before      { background:var(--green); }
  .row-card.paused::before      { background:var(--yellow); }
  .row-card.inactive::before    { background:var(--red); }
  .row-card.mesa-active::before { background:var(--cyan); }

  /* ── cell: machine id ── */
  .cell-id {
    padding:0 8px 0 12px;
    font-family:'Barlow Condensed',sans-serif;
    font-size:14px; font-weight:700; letter-spacing:2px;
    text-transform:uppercase; color:var(--muted);
    white-space:nowrap;
  }

  /* ── cell: product name ── */
  .cell-product {
    padding:0 12px;
    font-family:'Barlow Condensed',sans-serif;
    font-size:22px; font-weight:800; line-height:1.1;
    text-transform:uppercase; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    border-left:1px solid rgba(34,40,64,.6);
  }
  .row-card.inactive .cell-product { color:rgba(238,240,248,.25); font-size:18px; }

  /* ── cell: operario + hora ── */
  .cell-operator {
    padding:0 12px;
    border-left:1px solid rgba(34,40,64,.6);
    display:flex; flex-direction:column; justify-content:center; gap:1px;
  }
  .op-name {
    font-size:13px; font-weight:600; color:rgba(238,240,248,.6);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .op-time {
    font-family:'Barlow Condensed',sans-serif;
    font-size:12px; color:var(--muted); letter-spacing:1px;
  }
  .stop-reason {
    font-family:'Barlow Condensed',sans-serif;
    font-size:14px; font-weight:700; letter-spacing:1px; text-transform:uppercase;
  }
  .row-card.inactive .stop-reason { color:var(--red); opacity:.8; }
  .row-card.paused   .stop-reason { color:var(--yellow); opacity:.9; }

  /* ── cell: produccion ── */
  .cell-metric {
    padding:0 12px;
    border-left:1px solid rgba(34,40,64,.6);
    display:flex; flex-direction:column; align-items:flex-end; justify-content:center;
  }
  .metric-num {
    font-family:'Barlow Condensed',sans-serif;
    font-size:26px; font-weight:900; line-height:1; letter-spacing:1px;
  }
  .row-card.active      .metric-num { color:var(--green); }
  .row-card.mesa-active .metric-num { color:var(--cyan); }
  .row-card.paused      .metric-num { color:var(--yellow); }
  .row-card.inactive    .metric-num { color:rgba(238,240,248,.15); }
  .metric-label {
    font-size:9px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); font-weight:600; text-align:right;
  }

  /* ── cell: rendimiento ── */
  .cell-rend {
    padding:0 12px;
    border-left:1px solid rgba(34,40,64,.6);
    display:flex; flex-direction:column; align-items:flex-end; justify-content:center; gap:2px;
  }
  .rend-badge {
    display:inline-flex; align-items:center;
    padding:3px 10px; border-radius:3px;
    font-family:'Barlow Condensed',sans-serif;
    font-size:18px; font-weight:800; letter-spacing:1px;
  }
  .rend-badge.high { background:rgba(24,201,93,.15);  color:var(--green); }
  .rend-badge.mid  { background:rgba(245,166,35,.15); color:var(--yellow); }
  .rend-badge.low  { background:rgba(229,57,53,.15);  color:var(--red); }
  .rend-badge.none { background:rgba(255,255,255,.04); color:var(--muted); }
  .rend-label {
    font-size:9px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); font-weight:600; text-align:right;
  }

  /* ══ RIGHT COLUMN ══ */
  .right-col {
    display:flex; flex-direction:column; gap:8px;
    min-height:0;
  }

  .panel-box {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:5px;
    padding:14px 14px 12px;
    flex:1; overflow:hidden;
    display:flex; flex-direction:column;
  }

  .panel-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:13px; font-weight:700; letter-spacing:4px;
    text-transform:uppercase; color:var(--muted);
    margin-bottom:10px; padding-bottom:8px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }

  .plan-list { display:flex; flex-direction:column; flex:1; overflow:hidden; }

  .plan-row {
    display:flex; flex-direction:column;
    padding:9px 0;
    border-bottom:1px solid rgba(34,40,64,.8);
    flex-shrink:0;
  }
  .plan-row:last-child { border-bottom:none; }

  .plan-product {
    font-family:'Barlow Condensed',sans-serif;
    font-size:20px; font-weight:800; text-transform:uppercase;
    line-height:1.15; color:var(--text);
  }

  .plan-fecha {
    font-size:11px; font-weight:600; letter-spacing:1px;
    color:var(--accent); text-transform:uppercase; margin-top:2px;
  }

  /* stats box — compacto */
  .stats-box {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:5px;
    padding:10px 14px;
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:6px 12px;
    flex-shrink:0;
  }

  .stats-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:11px; font-weight:700; letter-spacing:4px;
    text-transform:uppercase; color:var(--muted);
    grid-column: 1 / -1;
    padding-bottom:6px;
    border-bottom:1px solid var(--border);
  }

  .stat-item { display:flex; align-items:baseline; justify-content:space-between; gap:4px; }
  .stat-lbl { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--muted); font-weight:600; }
  .stat-val {
    font-family:'Barlow Condensed',sans-serif;
    font-size:20px; font-weight:800;
  }
  .stat-val.g { color:var(--green); }
  .stat-val.c { color:var(--cyan); }
  .stat-val.y { color:var(--yellow); }
  .stat-val.r { color:var(--red); }
  .stat-val.m { color:var(--muted); font-size:16px; }

  /* stats en header */
  .header-stats {
    display:flex; align-items:center; gap:16px;
    border-right:1px solid var(--border); padding-right:20px;
  }
  .hstat { display:flex; align-items:baseline; gap:5px; }
  .hstat-lbl {
    font-size:10px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); font-weight:600;
  }
  .hstat-val {
    font-family:'Barlow Condensed',sans-serif;
    font-size:22px; font-weight:800;
  }
  .hstat-val.g { color:var(--green); }
  .hstat-val.c { color:var(--cyan); }
  .hstat-val.y { color:var(--yellow); }
  .hstat-val.r { color:var(--red); }

  /* ══ FOOTER ══ */
  footer {
    grid-column:1 / -1;
    display:flex; align-items:center; justify-content:space-between;
    border-top:1px solid var(--border); padding-top:8px;
  }

  .footer-stat { display:flex; align-items:baseline; gap:6px; }
  .footer-stat-lbl { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-weight:600; }
  .footer-stat-val { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:800; color:var(--green); }
  .footer-right { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); font-weight:600; }

  @keyframes numflash { 0%{opacity:.3} 100%{opacity:1} }
  .flash { animation:numflash .35s ease-out; }
</style>
</head>
<body>
<div class="root">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <div class="brand" id="companyName">Alpac SRL</div>
      <div class="tag">Rollos</div>
    </div>
    <div class="header-right">
      <div class="header-stats">
        <div class="hstat">
          <span class="hstat-lbl">Rebob.</span>
          <span class="hstat-val g" id="stRebobActive">—</span>
        </div>
        <div class="hstat">
          <span class="hstat-lbl">Mesas</span>
          <span class="hstat-val c" id="stMesasActive">—</span>
        </div>
        <div class="hstat">
          <span class="hstat-lbl">Paradas</span>
          <span class="hstat-val y" id="stPaused">—</span>
        </div>
        <div class="hstat">
          <span class="hstat-lbl">Inactivas</span>
          <span class="hstat-val r" id="stInactive">—</span>
        </div>
      </div>
      <div class="live-badge"><div class="live-dot"></div>EN VIVO</div>
      <div>
        <div class="clock" id="clock">00:00</div>
        <div class="date" id="dateDisplay">—</div>
      </div>
    </div>
  </header>

  <!-- REBOBINADORAS: ancho total -->
  <div class="left-col">
    <div class="section">
      <div class="section-label">Rebobinadoras</div>
      <div id="rebobList"></div>
    </div>
  </div>

  <!-- BOTTOM LEFT: mesas -->
  <div class="bottom-row">
    <div class="section">
      <div class="section-label">FC-10-05-Control de Embalaje</div>
      <div id="mesasList"></div>
    </div>
  </div>

  <!-- BOTTOM RIGHT: plan -->
  <div class="right-col">
    <div class="panel-box">
      <div class="panel-title">Plan de Producción</div>
      <div class="plan-list" id="planList"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="footer-stat">
      <span class="footer-stat-lbl">Producción teórica hoy</span>
      <span class="footer-stat-val" id="totalProd">—</span>
    </div>
    <div class="footer-right" id="lastUpdate">—</div>
  </footer>

</div>

function getSku(articulo) {
  if (!articulo) return null;
  const key = articulo.trim().toUpperCase();
  if (DESC_A_SKU[key]) return DESC_A_SKU[key];
  const found = Object.keys(DESC_A_SKU).find(k => key.includes(k) || k.includes(key));
  return found ? DESC_A_SKU[found] : null;

};

function getProduccionRebob(articulo, maquinaId) {
  if (!articulo) return null;
  const sku = getSku(articulo);
  if (!sku) return null;
  if (REBOB_RPM.includes(maquinaId)) {
    const p = PRODUCTOS_RPM[sku];
    if (!p) return null;
    return { valor: Math.round(p.rpm * 60 * 10), unidad: "rollos / día" };
  } else {
    const p = PRODUCTOS_CPD[sku];
    if (!p) return null;
    return { valor: p.cpd, unidad: "cajas / día" };
  }
}

// ═══════════════════════════════════════
// RENDIMIENTO → color
// ═══════════════════════════════════════
function rendClass(pct) {
  if (pct === null || pct === undefined) return "none";
  if (pct >= 70) return "high";
  if (pct >= 50) return "mid";
  return "low";
}

// ═══════════════════════════════════════
// RENDER
// ═══════════════════════════════════════
function fmt(n) { return Number(n).toLocaleString("es-AR"); }

function statusLabel(estado, motivo) {
  if (estado === "active")  return "En curso";
  if (estado === "paused")  return motivo || "Parada";
  return motivo || "Inactiva";
}

function buildRow(m, tipo) {
  const esMesa   = tipo === "mesa";
  const esActiva = m.estado === "active";

  // Estado CSS
  let rowClass = `row-card ${m.estado}`;
  if (esMesa && esActiva) rowClass = "row-card mesa-active";

  // Nombre a mostrar: descripción completa para todos
  const nombreProducto = m.articulo || "INACTIVA";

  // Operario / parada
  let operadorHTML = "";
  if (esActiva) {
    operadorHTML = `<div class="op-name">${m.operario||"—"}</div>`;
    if (!esMesa && m.horaInicio) operadorHTML += `<div class="op-time">Inicio: ${m.horaInicio}</div>`;
  } else {
    operadorHTML = `<div class="stop-reason">${m.motivoParada||"Inactiva"}</div>`;
  }

  // Métrica — solo rebobinadoras
  let metricaHTML = "";
  if (!esMesa) {
    const prod = esActiva ? getProduccionRebob(m.articulo, m.id) : null;
    metricaHTML = prod
      ? `<div class="metric-num">${fmt(prod.valor)}</div><div class="metric-label">${prod.unidad}</div>`
      : `<div class="metric-num" style="font-size:18px;opacity:.2">—</div><div class="metric-label">rollos / día</div>`;
  }

  // Rendimiento — solo rebobinadoras
  let rendHTML = "";
  if (!esMesa) {
    const rendRaw = m.rendimiento != null
      ? (m.rendimiento <= 1 ? Math.round(m.rendimiento * 100) : Math.round(m.rendimiento))
      : null;
    const rc = rendClass(rendRaw);
    rendHTML = rendRaw != null
      ? `<div class="rend-badge ${rc}">${rendRaw}%</div><div class="rend-label">rend. ${window._mesRef||''}</div>`
      : `<div class="rend-badge none">—</div><div class="rend-label">sin dato</div>`;
  }

  // Para mesas: grid de 3 columnas (sin métrica ni rendimiento)
  const gridStyle = esMesa
    ? 'style="grid-template-columns: 90px 1fr 180px;"'
    : '';

  return `
    <div class="${rowClass}" ${gridStyle}>
      <div class="cell-id">${m.id}</div>
      <div class="cell-product">${nombreProducto}</div>
      <div class="cell-operator">${operadorHTML}</div>
      ${!esMesa ? `<div class="cell-metric">${metricaHTML}</div>` : ''}
      ${!esMesa ? `<div class="cell-rend">${rendHTML}</div>` : ''}
    </div>
  `;
}

function renderAll(data) {
  document.getElementById("companyName").textContent = data.empresa || COMPANY_NAME;
  window._mesRef = data.mesRef || "";

  let nRebobActive=0, nMesasActive=0, nPaused=0, nInactive=0;

  // Rebobinadoras
  const rebobList = document.getElementById("rebobList");
  rebobList.innerHTML = (data.rebobinadoras || []).map(m => {
    if (m.estado==="active")       nRebobActive++;
    else if (m.estado==="paused")  nPaused++;
    else                           nInactive++;
    return buildRow(m, "rebob");
  }).join("");

  // Mesas
  const mesasList = document.getElementById("mesasList");
  mesasList.innerHTML = (data.mesas || []).map(m => {
    if (m.estado==="active") nMesasActive++;
    else                     nInactive++;

    // Si hay múltiples productos, generar una fila por producto
    if (m.estado === "active" && m.articulo && m.articulo.includes("||")) {
      const productos = m.articulo.split("||");
      return productos.map((prod, i) => {
        const mRow = { ...m, articulo: prod, id: i === 0 ? m.id : "" };
        return buildRow(mRow, "mesa");
      }).join("");
    }
    return buildRow(m, "mesa");
  }).join("");

  // Stats
  document.getElementById("stRebobActive").textContent = nRebobActive;
  document.getElementById("stMesasActive").textContent = nMesasActive;
  document.getElementById("stPaused").textContent      = nPaused;
  document.getElementById("stInactive").textContent    = nInactive;

  // Footer prod total (solo rebobinadoras activas)
  let totalProd = 0;
  (data.rebobinadoras || []).forEach(m => {
    if (m.estado === "active") {
      const p = getProduccionRebob(m.articulo, m.id);
      if (p) totalProd += p.valor;
    }
  });
  const tcEl = document.getElementById("totalProd");
  const newVal = fmt(totalProd);
  if (tcEl.textContent !== newVal) {
    tcEl.textContent = newVal;
    tcEl.classList.remove("flash"); void tcEl.offsetWidth; tcEl.classList.add("flash");
  }

  // Plan
  const planList = document.getElementById("planList");
  planList.innerHTML = "";
  (data.plan||[]).forEach(p => {
    const row = document.createElement("div");
    row.className = "plan-row";
    row.innerHTML = `
      <div class="plan-product">${p.producto}</div>
      <div class="plan-fecha">${p.fecha||""}</div>
    `;
    planList.appendChild(row);
  });

  // Last update
  const now = new Date();
  document.getElementById("lastUpdate").textContent =
    `Última actualización: ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}:${String(now.getSeconds()).padStart(2,"0")}`;
}

// ═══════════════════════════════════════
// RELOJ
// ═══════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
  const days   = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  document.getElementById("dateDisplay").textContent =
    `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

// ═══════════════════════════════════════
// FETCH
// ═══════════════════════════════════════
async function fetchAndRender() {
  let data;
  if (FETCH_FROM_SHEET) {
    try { const r = await fetch(SHEET_URL); data = await r.json(); }
    catch(e) { console.warn("Sheet no disponible, usando demo"); data = getDemoData(); }
  } else {
    data = getDemoData();
  }
  renderAll(data);
}
